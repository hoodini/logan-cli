<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#1a1018"/>
    </linearGradient>
    <linearGradient id="pinkCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d9a"/>
      <stop offset="100%" stop-color="#d63384"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#ff4d9a" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1400" height="780" fill="url(#bg)"/>
  <!-- claw accents -->
  <path d="M60 50 L160 20 L110 130 Z" fill="#ff4d9a" opacity="0.4"/>
  <path d="M180 40 L240 70 L200 120 Z" fill="#ffd60a" opacity="0.25"/>
  <path d="M1220 680 L1340 640 L1300 760 Z" fill="#ff4d9a" opacity="0.3"/>
  <path d="M1280 60 L1380 40 L1340 140 Z" fill="#ffd60a" opacity="0.2"/>

  <text x="700" y="78" text-anchor="middle" fill="#f5f0e8" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800">ONE COMMAND INSTALL</text>
  <text x="700" y="118" text-anchor="middle" fill="#ff4d9a" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600">macOS · Linux · Windows · no thesis required</text>

  <!-- Step 1 -->
  <g filter="url(#soft)">
    <rect x="70" y="180" width="380" height="380" rx="20" fill="#f5f0e8"/>
    <rect x="70" y="180" width="380" height="56" rx="20" fill="url(#pinkCard)"/>
    <rect x="70" y="210" width="380" height="26" fill="url(#pinkCard)"/>
    <text x="100" y="218" fill="#0c0c0e" font-family="system-ui,sans-serif" font-size="22" font-weight="800">1 · PASTE</text>
    <text x="95" y="290" fill="#0c0c0e" font-family="ui-monospace,Menlo,monospace" font-size="18" font-weight="700">curl -fsSL ... | bash</text>
    <rect x="95" y="310" width="330" height="70" rx="10" fill="#1a1018"/>
    <text x="110" y="340" fill="#ffd60a" font-family="ui-monospace,Menlo,monospace" font-size="13">install-logan.sh</text>
    <text x="110" y="362" fill="#ff4d9a" font-family="ui-monospace,Menlo,monospace" font-size="13">macOS / Linux</text>
    <text x="95" y="420" fill="#333" font-family="system-ui,sans-serif" font-size="16">Windows PowerShell:</text>
    <rect x="95" y="440" width="330" height="50" rx="10" fill="#1a1018"/>
    <text x="110" y="470" fill="#64b4aa" font-family="ui-monospace,Menlo,monospace" font-size="14">irm ... | iex</text>
    <text x="95" y="530" fill="#666" font-family="system-ui,sans-serif" font-size="14">hoodini/logan-cli · raw GitHub</text>
  </g>

  <!-- arrow -->
  <path d="M470 360 L510 360 L510 345 L560 375 L510 405 L510 390 L470 390 Z" fill="#ffd60a"/>

  <!-- Step 2 -->
  <g filter="url(#soft)">
    <rect x="580" y="180" width="320" height="380" rx="20" fill="#f5f0e8"/>
    <rect x="580" y="180" width="320" height="56" rx="20" fill="url(#pinkCard)"/>
    <rect x="580" y="210" width="320" height="26" fill="url(#pinkCard)"/>
    <text x="610" y="218" fill="#0c0c0e" font-family="system-ui,sans-serif" font-size="22" font-weight="800">2 · LOGIN</text>
    <text x="620" y="310" fill="#0c0c0e" font-family="ui-monospace,Menlo,monospace" font-size="28" font-weight="800">logan login</text>
    <text x="620" y="360" fill="#555" font-family="system-ui,sans-serif" font-size="16">or set your API key:</text>
    <rect x="605" y="380" width="270" height="50" rx="10" fill="#1a1018"/>
    <text x="620" y="410" fill="#ffd60a" font-family="ui-monospace,Menlo,monospace" font-size="14">XAI_API_KEY=...</text>
    <text x="620" y="480" fill="#666" font-family="system-ui,sans-serif" font-size="15">xAI · OpenAI-compat</text>
    <text x="620" y="505" fill="#666" font-family="system-ui,sans-serif" font-size="15">Anthropic · local</text>
  </g>

  <path d="M920 360 L960 360 L960 345 L1010 375 L960 405 L960 390 L920 390 Z" fill="#ffd60a"/>

  <!-- Step 3 -->
  <g filter="url(#soft)">
    <rect x="1030" y="180" width="300" height="380" rx="20" fill="#1a1018" stroke="#ff4d9a" stroke-width="3"/>
    <rect x="1030" y="180" width="300" height="56" rx="20" fill="url(#pinkCard)"/>
    <rect x="1030" y="210" width="300" height="26" fill="url(#pinkCard)"/>
    <text x="1060" y="218" fill="#0c0c0e" font-family="system-ui,sans-serif" font-size="22" font-weight="800">3 · CODE</text>
    <text x="1070" y="300" fill="#ffd60a" font-family="ui-monospace,Menlo,monospace" font-size="36" font-weight="800">logan</text>
    <rect x="1060" y="330" width="240" height="120" rx="12" fill="#0c0c0e" stroke="#333" stroke-width="1"/>
    <text x="1075" y="365" fill="#64b4aa" font-family="ui-monospace,Menlo,monospace" font-size="13">m grok-4.5 · 12%</text>
    <text x="1075" y="390" fill="#ff4d9a" font-family="ui-monospace,Menlo,monospace" font-size="13">in 2.4K out 180</text>
    <text x="1075" y="415" fill="#ffd60a" font-family="ui-monospace,Menlo,monospace" font-size="13">c 1.2K · live bar</text>
    <text x="1070" y="500" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">TUI opens. Claws out.</text>
  </g>

  <text x="700" y="640" text-anchor="middle" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="36" font-weight="800">INSTALL. LOGIN. CODE.</text>
  <text x="700" y="690" text-anchor="middle" fill="#9a9590" font-family="system-ui,sans-serif" font-size="18">Yuval Avidani (YUV.AI) · github.com/hoodini/logan-cli</text>
  <text x="700" y="730" text-anchor="middle" fill="#666" font-family="system-ui,sans-serif" font-size="15">Apache-2.0 fork of xAI Grok Build · one paste, real agent</text>
</svg>
