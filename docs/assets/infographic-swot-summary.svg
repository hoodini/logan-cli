<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#1a1218"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <!-- claw accents -->
  <path d="M40 80 L120 40 L90 120 Z" fill="#ff4d9a" opacity="0.35"/>
  <path d="M1280 820 L1360 780 L1330 860 Z" fill="#ffd60a" opacity="0.25"/>

  <text x="70" y="70" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="42" font-weight="800">LOGAN vs the field</text>
  <text x="70" y="110" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="20">Honest snapshot · token visibility · one-command install · multi-LLM</text>

  <!-- Logan highlight -->
  <rect x="70" y="150" width="1260" height="100" rx="16" fill="#1f1520" stroke="#ff4d9a" stroke-width="3"/>
  <text x="100" y="195" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Logan wins when you want: cost clarity + terminal agent power + open multi-LLM</text>
  <text x="100" y="230" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="18">/stats · /context deep · live in/out/cache bar · curl|bash install · fork of Grok Build (Apache-2.0)</text>

  <!-- competitor cards -->
  <!-- Copilot -->
  <rect x="70" y="280" width="400" height="260" rx="14" fill="#141418" stroke="#3a3a42" stroke-width="2"/>
  <text x="95" y="325" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">GitHub Copilot</text>
  <text x="95" y="365" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="16">S: IDE-native, huge reach</text>
  <text x="95" y="400" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">W: less terminal agent depth</text>
  <text x="95" y="435" fill="#64b4aa" font-family="system-ui,sans-serif" font-size="16">O: enterprise workflows</text>
  <text x="95" y="470" fill="#bb9af7" font-family="system-ui,sans-serif" font-size="16">T: lock-in to GitHub stack</text>
  <text x="95" y="510" fill="#9a9590" font-family="system-ui,sans-serif" font-size="14">Logan: open CLI + full token story</text>

  <!-- Claude Code -->
  <rect x="500" y="280" width="400" height="260" rx="14" fill="#141418" stroke="#3a3a42" stroke-width="2"/>
  <text x="525" y="325" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">Claude Code</text>
  <text x="525" y="365" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="16">S: strong coding agent UX</text>
  <text x="525" y="400" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">W: Anthropic-centered stack</text>
  <text x="525" y="435" fill="#64b4aa" font-family="system-ui,sans-serif" font-size="16">O: power users in terminal</text>
  <text x="525" y="470" fill="#bb9af7" font-family="system-ui,sans-serif" font-size="16">T: vendor model dependency</text>
  <text x="525" y="510" fill="#9a9590" font-family="system-ui,sans-serif" font-size="14">Logan: multi-LLM + deep context text</text>

  <!-- Cursor -->
  <rect x="930" y="280" width="400" height="260" rx="14" fill="#141418" stroke="#3a3a42" stroke-width="2"/>
  <text x="955" y="325" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">Cursor</text>
  <text x="955" y="365" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="16">S: best-in-class AI IDE</text>
  <text x="955" y="400" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">W: not a pure headless CLI</text>
  <text x="955" y="435" fill="#64b4aa" font-family="system-ui,sans-serif" font-size="16">O: teams living in editor</text>
  <text x="955" y="470" fill="#bb9af7" font-family="system-ui,sans-serif" font-size="16">T: SaaS pricing / closed core</text>
  <text x="955" y="510" fill="#9a9590" font-family="system-ui,sans-serif" font-size="14">Logan: terminal-native + open fork</text>

  <!-- Hermes -->
  <rect x="70" y="570" width="400" height="260" rx="14" fill="#141418" stroke="#3a3a42" stroke-width="2"/>
  <text x="95" y="615" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">Hermes</text>
  <text x="95" y="655" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="16">S: learning loop / skills</text>
  <text x="95" y="690" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">W: broader than code-first</text>
  <text x="95" y="725" fill="#64b4aa" font-family="system-ui,sans-serif" font-size="16">O: self-improving agents</text>
  <text x="95" y="760" fill="#bb9af7" font-family="system-ui,sans-serif" font-size="16">T: setup / model quality</text>
  <text x="95" y="800" fill="#9a9590" font-family="system-ui,sans-serif" font-size="14">Logan: coding harness + spend UX</text>

  <!-- OpenClaw -->
  <rect x="500" y="570" width="400" height="260" rx="14" fill="#141418" stroke="#3a3a42" stroke-width="2"/>
  <text x="525" y="615" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">OpenClaw</text>
  <text x="525" y="655" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="16">S: personal agent + skills</text>
  <text x="525" y="690" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">W: not code-IDE focused</text>
  <text x="525" y="725" fill="#64b4aa" font-family="system-ui,sans-serif" font-size="16">O: messaging + automation</text>
  <text x="525" y="760" fill="#bb9af7" font-family="system-ui,sans-serif" font-size="16">T: sprawling surface area</text>
  <text x="525" y="800" fill="#9a9590" font-family="system-ui,sans-serif" font-size="14">Logan: deep coding agent CLI</text>

  <!-- Logan -->
  <rect x="930" y="570" width="400" height="260" rx="14" fill="#221018" stroke="#ffd60a" stroke-width="4"/>
  <text x="955" y="615" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="24" font-weight="700">Logan ★</text>
  <text x="955" y="655" fill="#ff4d9a" font-family="system-ui,sans-serif" font-size="16">S: tokens always visible</text>
  <text x="955" y="690" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">W: no IDE plugin product</text>
  <text x="955" y="725" fill="#64b4aa" font-family="system-ui,sans-serif" font-size="16">O: open multi-LLM builders</text>
  <text x="955" y="760" fill="#bb9af7" font-family="system-ui,sans-serif" font-size="16">T: big-brand agents</text>
  <text x="955" y="800" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="14">Proof: /stats · /context deep</text>
</svg>
