<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="50%" stop-color="#141018"/>
      <stop offset="100%" stop-color="#0d0d10"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd60a"/>
      <stop offset="100%" stop-color="#ff4d9a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <!-- claw marks top left -->
  <path d="M40 30 L90 180" stroke="#ffd60a" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M70 25 L130 175" stroke="#ffd60a" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M100 20 L170 170" stroke="#ff4d9a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <text x="200" y="70" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="42" font-weight="800">LOGAN · Prompt Journey</text>
  <text x="200" y="105" fill="#9a9590" font-family="system-ui,sans-serif" font-size="18">From your keystroke to the model, tools, and memory · by Yuval Avidani (YUV.AI)</text>

  <!-- steps as horizontal flow then loop -->
  <!-- row 1 -->
  <g font-family="system-ui,sans-serif">
    <rect x="50" y="160" width="240" height="110" rx="14" fill="#1a1520" stroke="#ffd60a" stroke-width="2"/>
    <text x="70" y="195" fill="#ffd60a" font-size="14" font-weight="700">1 · YOU TYPE</text>
    <text x="70" y="225" fill="#f5f0e8" font-size="16">Prompt in TUI / headless</text>
    <text x="70" y="248" fill="#9a9590" font-size="14">or ACP / editor embed</text>

    <path d="M300 215 L330 215" stroke="#ff4d9a" stroke-width="3" marker-end="url(#m)"/>
    <polygon points="330,210 345,215 330,220" fill="#ff4d9a"/>

    <rect x="350" y="160" width="240" height="110" rx="14" fill="#1a1520" stroke="#ff4d9a" stroke-width="2"/>
    <text x="370" y="195" fill="#ff4d9a" font-size="14" font-weight="700">2 · CLI PARSE</text>
    <text x="370" y="225" fill="#f5f0e8" font-size="16">logan binary + clap</text>
    <text x="370" y="248" fill="#9a9590" font-size="14">cwd · model · flags</text>

    <path d="M600 215 L630 215" stroke="#ff4d9a" stroke-width="3"/>
    <polygon points="630,210 645,215 630,220" fill="#ff4d9a"/>

    <rect x="650" y="160" width="240" height="110" rx="14" fill="#1a1520" stroke="#a5d8ff" stroke-width="2"/>
    <text x="670" y="195" fill="#a5d8ff" font-size="14" font-weight="700">3 · SESSION ACTOR</text>
    <text x="670" y="225" fill="#f5f0e8" font-size="16">handle_prompt</text>
    <text x="670" y="248" fill="#9a9590" font-size="14">slash · skills rewrite</text>

    <path d="M900 215 L930 215" stroke="#ff4d9a" stroke-width="3"/>
    <polygon points="930,210 945,215 930,220" fill="#ff4d9a"/>

    <rect x="950" y="160" width="240" height="110" rx="14" fill="#1a1520" stroke="#d0bfff" stroke-width="2"/>
    <text x="970" y="195" fill="#d0bfff" font-size="14" font-weight="700">4 · BUILD REQUEST</text>
    <text x="970" y="225" fill="#f5f0e8" font-size="16">ChatStateActor</text>
    <text x="970" y="248" fill="#9a9590" font-size="14">history · prune · tools</text>
  </g>

  <!-- row 2 -->
  <g font-family="system-ui,sans-serif">
    <rect x="50" y="360" width="300" height="140" rx="14" fill="#1a1520" stroke="#fff3bf" stroke-width="2"/>
    <text x="70" y="400" fill="#fff3bf" font-size="14" font-weight="700">5 · SYSTEM PROMPT LAYERS</text>
    <text x="70" y="430" fill="#f5f0e8" font-size="15">base template (Logan identity)</text>
    <text x="70" y="455" fill="#f5f0e8" font-size="15">+ tool schemas + skills</text>
    <text x="70" y="480" fill="#f5f0e8" font-size="15">+ AGENTS.md + memory-context</text>

    <rect x="400" y="360" width="280" height="140" rx="14" fill="#1a1520" stroke="#ffd8a8" stroke-width="2"/>
    <text x="420" y="400" fill="#ffd8a8" font-size="14" font-weight="700">6 · SAMPLER (LLM)</text>
    <text x="420" y="430" fill="#f5f0e8" font-size="15">chat_completions</text>
    <text x="420" y="455" fill="#f5f0e8" font-size="15">responses · messages</text>
    <text x="420" y="480" fill="#9a9590" font-size="14">Anthropic · OpenAI · Ollama…</text>

    <rect x="730" y="360" width="280" height="140" rx="14" fill="#1a1520" stroke="#b2f2bb" stroke-width="2"/>
    <text x="750" y="400" fill="#b2f2bb" font-size="14" font-weight="700">7 · TOOL LOOP</text>
    <text x="750" y="430" fill="#f5f0e8" font-size="15">edit · shell · search</text>
    <text x="750" y="455" fill="#f5f0e8" font-size="15">MCP connectors · skills</text>
    <text x="750" y="480" fill="#9a9590" font-size="14">until end_turn</text>

    <rect x="1060" y="360" width="280" height="140" rx="14" fill="#1a1520" stroke="#c3fae8" stroke-width="2"/>
    <text x="1080" y="400" fill="#c3fae8" font-size="14" font-weight="700">8 · STREAM + LEARN</text>
    <text x="1080" y="430" fill="#f5f0e8" font-size="15">TUI + updates.jsonl</text>
    <text x="1080" y="455" fill="#f5f0e8" font-size="15">Stop hook → MEMORY.md</text>
    <text x="1080" y="480" fill="#9a9590" font-size="14">self-improve · dream</text>
  </g>

  <!-- arrows down from row1 to row2 -->
  <path d="M1070 270 L1070 300 L200 300 L200 350" fill="none" stroke="#ff4d9a" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="195,345 200,360 205,345" fill="#ff4d9a"/>

  <!-- memory strip -->
  <rect x="50" y="560" width="1300" height="120" rx="16" fill="#121018" stroke="#ffd60a" stroke-width="1.5"/>
  <text x="80" y="600" fill="#ffd60a" font-family="system-ui,sans-serif" font-size="18" font-weight="700">MEMORY ON THIS PATH</text>
  <text x="80" y="635" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">Short-term: session conversation + ~/.logan/sessions/…</text>
  <text x="80" y="660" fill="#f5f0e8" font-family="system-ui,sans-serif" font-size="16">Long-term: ~/.logan/memory/MEMORY.md · hybrid search injects &lt;memory-context&gt; on first turn · autoDream consolidates</text>

  <text x="50" y="740" fill="#9a9590" font-family="system-ui,sans-serif" font-size="15">Context: prune tool results ~50% · auto-compact ~85% · no fixed system-prompt size (grows with tools/skills/rules)</text>
  <text x="50" y="780" fill="#6b6560" font-family="system-ui,sans-serif" font-size="14">Inspired by Wolverine · claws out for hard bugs · hoodini/logan-cli · Apache-2.0 fork of xAI Grok Build</text>

  <!-- bottom claws -->
  <path d="M1280 820 L1340 880" stroke="#ffd60a" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M1310 815 L1380 885" stroke="#ffd60a" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M1340 810 L1410 890" stroke="#ff4d9a" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
</svg>
